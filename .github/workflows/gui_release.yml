name: Build and Release GUI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            asset_name: ResRamQt-linux
          - os: windows-latest
            asset_name: ResRamQt-windows.exe
          - os: macos-latest
            asset_name: ResRamQt-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1-mesa-glx libxcb-xinerama0 libxcb-cursor0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pyqtgraph lmfit matplotlib numpy scipy nuitka

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --onefile --enable-plugin=pyqt6 --include-qt-plugins=qml --output-filename=${{ matrix.asset_name }} ResRamQt.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: ${{ matrix.asset_name }}
